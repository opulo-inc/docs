site_name: Opulo Documentation
site_url: https://docs.opulo.io/
repo_url: https://github.com/opulo-inc/lumenpnp/
edit_uri: https://github.com/opulo-inc/docs/edit/main/docs

extra_css:
    - stylesheets/extra.css
    - stylesheets/neoteroi-cards.css

markdown_extensions:
    - admonition
    - def_list
    - pymdownx.superfences
    - attr_list
    - md_in_html
    - neoteroi.cards
    - meta
    - footnotes
    - pymdownx.tabbed:
        alternate_style: true
    - pymdownx.superfences:
        custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


theme:
    name: material
    logo: img/opulo.webp
    favicon: img/favicon.ico
    font:
        text: Figtree
    features:
        # Turning off footer nav as it can be misleading, and we have explicit links to the appropriate next section for every page
        #- navigation.footer
        - navigation.tracking
        - navigation.tabs
        - navigation.tabs.sticky
        - content.tabs.link
        - content.action.edit
        - toc.integrate
        - content.code.copy

    palette:
        #primary: custom
        # Palette toggle for dark mode
        - media: "(prefers-color-scheme: dark)"
          primary: custom
          accent: custom
          scheme: slate
          toggle:
            icon: material/brightness-4
            name: Switch to light mode

        # Palette toggle for light mode
        - media: "(prefers-color-scheme: light)"
          primary: custom
          accent: custom
          scheme: default
          toggle:
            icon: material/brightness-7
            name: Switch to dark mode
plugins:
    - glightbox:
        draggable: false
    - search
    - social:
        cards_layout_options:
            background_color: "#111111"
            color: "#daa520"
            font_family: Figtree
    - neoteroi.mkdocsoad:
        use_pymdownx: true
extra:
  social:
    - icon: fontawesome/brands/facebook-f
      link: https://www.facebook.com/opuloinc
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/OpuloInc
    - icon: fontawesome/brands/instagram
      link: https://www.instagram.com/opulo.io
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCMf49SMPnhxdLormhEpfyfg
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/TCwy6De
